<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQLSpread</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="topbar">
    <button class="btn" id="openBtn" type="button">Datei öffnen</button>
    <label for="dbFile" class="file-label">SQLite-Datei auswählen</label>
    <input type="file" id="dbFile" accept=".sqlite,.db,.sqlite3,.db3,.bin,.dat" />
    <button class="btn" id="saveBtn" type="button">Datenbank speichern</button>
<div id="status" class="status">Keine Datei geladen</div>
  </div>

  <div class="formula-bar">
    <div class="name-box" id="nameBox">-</div>
    <div class="formula-input" id="formulaBox">-</div>
  </div>

  <div class="main">
    <div class="sheet-wrap" id="sheetWrap">
      <div class="empty">
        SQLite-Datei laden. Erwartet werden die Tabellen <code>data</code>, <code>general_tabs</code>,
        <code>general_rows</code> und <code>general_columns</code>.
        <div class="muted">Tabs = <code>z</code>, Spalten = <code>x</code>, Zeilen = <code>y</code>.</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <script src="sql-wasm.js"></script>
  <script src="script.js"></script>
</body>
</html>
