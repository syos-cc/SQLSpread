<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQLSpread</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="topbar">
    <label for="dbFile" class="file-label" id="openDbLabel">Select SQLite file</label>
    <input type="file" id="dbFile" accept=".sqlite,.db,.sqlite3,.db3,.bin,.dat,.sqlspread" />
    <button class="btn" id="saveBtn" type="button">Save database</button>
    <div id="status" class="status">No file loaded</div>
  </div>

  <div class="formula-bar">
    <div class="name-box" id="nameBox">-</div>
    <input class="formula-input" id="formulaBox" type="text" value="-" disabled />
  </div>

  <div class="main">
    <div class="sheet-wrap" id="sheetWrap">
      <div class="empty">
        Load a SQLite file. Expected tables: <code>tabs</code>, <code>lines</code>, <code>parts</code>, and <code>cells</code>.
        <div class="muted">Tabs = <code>name</code>, columns = <code>part</code>, rows = <code>line</code>.</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="customTooltip" class="custom-tooltip"></div>
  <div id="filterMenu" class="filter-menu"></div>

  <script src="./sql-wasm.js"></script>
  <script type="module" src="./sqlspread-app.js"></script>
</body>
</html>
