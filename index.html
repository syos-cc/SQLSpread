<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQLSpread</title>
  <style>
    :root {
      --excel-green: #217346;
      --grid: #d9d9d9;
      --header-bg: #f3f3f3;
      --sheet-bg: #ffffff;
      --text: #000000;
      --tab-border: #c8c8c8;
      --panel-bg: #fafafa;
      --error-bg: #c62828;
      --checkbox-border: #8a8a8a;
      --checkbox-bg: #ffffff;
      --checkbox-checked-bg: #217346;
      --checkbox-check: #ffffff;
      --editable-hover: #e8f0fe;
      --editable-active: #d2e3fc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid #d0d0d0;
      background: var(--panel-bg);
      flex-wrap: wrap;
    }

    .btn,
    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid #bfbfbf;
      background: #ffffff;
      color: #222;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      user-select: none;
    }

    .btn:hover,
    .file-label:hover {
      background: #f1f1f1;
    }

    #dbFile {
      display: none;
    }

    .status {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border: 1px solid #d0d0d0;
      background: #fff;
      border-radius: 4px;
      font-size: 13px;
      color: #333;
      max-width: 100%;
    }

    .error {
      background: var(--error-bg);
      color: white;
      border-color: var(--error-bg);
    }

    .formula-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #d0d0d0;
      background: #ffffff;
    }

    .name-box {
      width: 90px;
      min-height: 28px;
      border: 1px solid #cfcfcf;
      background: #fff;
      padding: 4px 8px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
    }

    .formula-input {
      flex: 1;
      min-height: 28px;
      height: 28px;
      border: 1px solid #cfcfcf;
      background: #fff;
      padding: 4px 8px;
      font-size: 13px;
      outline: none;
    }

    .formula-input:disabled {
      background: #f3f3f3;
      color: #777;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .sheet-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: var(--sheet-bg);
    }

    table.sheet {
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
      width: max-content;
      min-width: 0;
    }

    table.sheet th,
    table.sheet td {
      border: 1px solid var(--grid);
      height: 24px;
      min-height: 24px;
      max-height: 24px;
      padding: 2px 6px;
      font: 14px Calibri, "Segoe UI", Arial, sans-serif;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
      background: #fff;
    }

    table.sheet thead th,
    .row-header,
    .corner-cell {
      background: var(--header-bg) !important;
      font-weight: 400;
      text-align: center;
    }

    .corner-cell {
      min-width: 48px;
      width: 48px;
      position: sticky;
      top: 0;
      left: 0;
      z-index: 4;
    }

    .col-header {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 0 !important;
      overflow: visible !important;
    }

    .col-header-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 2px 16px 2px 6px;
    }

    .col-header-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-header.sortable {
      cursor: pointer;
    }

    .col-header.sortable:hover {
      background: #e8ecef !important;
    }

    .sort-indicator {
      min-width: 10px;
      font-size: 11px;
      line-height: 1;
      color: #666;
      user-select: none;
    }

    .col-header.sorted .sort-indicator {
      color: var(--excel-green);
      font-weight: 700;
    }

    .col-resizer {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      user-select: none;
      z-index: 10;
    }

    .col-resizer:hover {
      background: rgba(33, 115, 70, 0.15);
    }

    .row-header {
      position: sticky;
      left: 0;
      z-index: 2;
      width: 48px;
      min-width: 48px;
      padding: 0 !important;
      overflow: visible !important;
    }

    .row-header-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px 10px 6px;
    }

    .row-resizer {
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 100%;
      height: 6px;
      cursor: row-resize;
      user-select: none;
      z-index: 10;
    }

    .row-resizer:hover {
      background: rgba(33, 115, 70, 0.15);
    }

    .tabs {
      display: flex;
      align-items: end;
      gap: 2px;
      padding: 8px 8px 0 8px;
      border-top: 1px solid #d0d0d0;
      background: #f3f3f3;
      overflow-x: auto;
      min-height: 44px;
    }

    .tab {
      border: 1px solid var(--tab-border);
      border-bottom: none;
      background: #eaeaea;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      white-space: nowrap;
      font-size: 14px;
      user-select: none;
    }

    .tab.active {
      background: #fff;
      position: relative;
      color: var(--excel-green);
      font-weight: 600;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      background: var(--excel-green);
      border-radius: 6px 6px 0 0;
    }

    .empty {
      padding: 24px;
      color: #555;
      font-size: 14px;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .bool-cell {
      text-align: center !important;
      padding: 0 !important;
    }

    .bool-checkbox {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 1px solid var(--checkbox-border);
      border-radius: 3px;
      background: var(--checkbox-bg);
      position: relative;
      vertical-align: middle;
      margin: 0;
    }

    .bool-checkbox.checked {
      background: var(--checkbox-checked-bg);
      border-color: var(--checkbox-checked-bg);
    }

    .bool-checkbox.checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid var(--checkbox-check);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .json-dropdown-cell {
      padding: 0 !important;
    }

    .dropdown-cell {
      background-color: inherit !important;
    }

    .cell-dropdown {
      width: 100%;
      height: 100%;
      min-height: 22px;
      border: none;
      outline: none;
      margin: 0;
      padding: 0 20px 0 6px;
      background-color: transparent;
      font: inherit;
      color: inherit;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #666 50%),
        linear-gradient(135deg, #666 50%, transparent 50%);
      background-position:
        calc(100% - 12px) calc(50% - 2px),
        calc(100% - 8px) calc(50% - 2px);
      background-size: 4px 4px, 4px 4px;
      background-repeat: no-repeat;
    }

    .cell-dropdown:disabled {
      background-color: transparent;
      color: inherit;
      opacity: 1;
      cursor: default;
    }

    td[data-editable="true"] {
      cursor: text;
    }

    td[data-editable="true"]:hover {
      background: var(--editable-hover) !important;
    }

    td[data-editable="false"] {
      cursor: default;
    }

    td.cell-selected {
      outline: 2px solid var(--excel-green);
      outline-offset: -2px;
    }

    td.cell-editing {
      background: var(--editable-active) !important;
      padding: 0 !important;
    }

    .cell-editor {
      width: 100%;
      height: 100%;
      min-height: 22px;
      border: none;
      outline: none;
      margin: 0;
      padding: 2px 6px;
      background: transparent;
      font: inherit;
      color: inherit;
    }

    body.col-resizing,
    body.col-resizing * {
      cursor: col-resize !important;
      user-select: none !important;
    }

    body.row-resizing,
    body.row-resizing * {
      cursor: row-resize !important;
      user-select: none !important;
    }

    .custom-tooltip {
      position: fixed;
      display: none;
      max-width: 360px;
      padding: 6px 8px;
      background: #fff8c4;
      color: #222;
      border: 1px solid #c9b458;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      font: 13px Calibri, "Segoe UI", Arial, sans-serif;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <label for="dbFile" class="file-label" id="openDbLabel">SQLite-Datei auswählen</label>
    <input type="file" id="dbFile" accept=".sqlite,.db,.sqlite3,.db3,.bin,.dat" />
    <button class="btn" id="saveBtn" type="button">Datenbank speichern</button>
    <div id="status" class="status">Keine Datei geladen</div>
  </div>

  <div class="formula-bar">
    <div class="name-box" id="nameBox">-</div>
    <input class="formula-input" id="formulaBox" type="text" value="-" disabled />
  </div>

  <div class="main">
    <div class="sheet-wrap" id="sheetWrap">
      <div class="empty">
        SQLite-Datei laden. Erwartet werden die Tabellen <code>tabs</code>, <code>lines</code>, <code>parts</code> und <code>cells</code>.
        <div class="muted">Tabs = <code>name</code>, Spalten = <code>part</code>, Zeilen = <code>line</code>.</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="customTooltip" class="custom-tooltip"></div>

  <script src="sql-wasm.js"></script>
  <script>
    let SQL;
    let db;
    let workbook = new Map();
    let currentSheet = null;
    let currentDbPath = null;
    let currentDbName = 'database.sqlite';
    let currentSelectedCellRef = null;
    const sheetSortState = new Map();

    const statusEl = document.getElementById('status');
    const tabsEl = document.getElementById('tabs');
    const sheetWrapEl = document.getElementById('sheetWrap');
    const dbFileInput = document.getElementById('dbFile');
    const openDbLabel = document.getElementById('openDbLabel');
    const nameBox = document.getElementById('nameBox');
    const formulaBox = document.getElementById('formulaBox');
    const saveBtn = document.getElementById('saveBtn');
    const customTooltip = document.getElementById('customTooltip');

    const DEFAULTS = {
      TAB: {
        visibility: 'visible',
        user_select: true
      },
      ROW: {
        height: '24px',
        min_height: '24px',
        max_height: '24px',
        background_color: '#ffffff',
        visibility: 'visible',
        user_select: true
      },
      COLUMN: {
        width: '120px',
        min_width: '40px',
        max_width: '500px',
        background_color: '#ffffff',
        visibility: 'visible',
        user_select: true
      },
      CELL: {
        padding: '2px 6px',
        border: '1px solid #d9d9d9',
        border_top: null,
        border_right: null,
        border_bottom: null,
        border_left: null,
        background_color: '#ffffff',
        box_shadow: 'none',
        text_align: 'left',
        vertical_align: 'middle',
        font: '14px Calibri, "Segoe UI", Arial, sans-serif',
        font_weight: 'normal',
        color: '#000000',
        white_space: 'nowrap',
        overflow: 'hidden',
        text_overflow: 'ellipsis',
        display: 'table-cell',
        visibility: 'visible',
        opacity: '1',
        cursor: 'cell',
        user_select: true,
        notice: ''
      }
    };

    function isElectron() {
      return typeof window.sqlspreadFS !== 'undefined';
    }

    function setStatus(message, isError = false) {
      if (!statusEl) return;
      statusEl.textContent = message;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeColName(x) {
      return String(x || '').trim().toUpperCase();
    }

    function colNameToNumber(name) {
      const s = normalizeColName(name);
      if (!/^[A-Z]+$/.test(s)) return Number.MAX_SAFE_INTEGER;
      let num = 0;
      for (let i = 0; i < s.length; i += 1) {
        num = num * 26 + (s.charCodeAt(i) - 64);
      }
      return num;
    }

    function sortColumns(cols) {
      return [...cols].sort((a, b) => {
        const na = colNameToNumber(a);
        const nb = colNameToNumber(b);
        if (na !== nb) return na - nb;
        return String(a).localeCompare(String(b));
      });
    }

    function withDefault(value, fallback) {
      return value === null || value === undefined ? fallback : value;
    }

    function styleValue(value) {
      return value === null || value === undefined || value === '' ? undefined : value;
    }

    function cssUserSelect(value) {
      if (value === null || value === undefined) return undefined;
      return value ? 'text' : 'none';
    }

    function isBooleanTrue(value) {
      if (value === true) return true;
      if (value === 1) return true;
      if (value === '1') return true;
      if (typeof value === 'string' && value.toLowerCase() === 'true') return true;
      return false;
    }

    function isExplicitFalse(value) {
      return value === false || value === 0 || value === '0' ||
             (typeof value === 'string' && value.toLowerCase() === 'false');
    }

    function parseJsonValue(cell) {
      if (!cell || cell.value == null || cell.value === '') return null;
      try {
        return typeof cell.value === 'string' ? JSON.parse(cell.value) : cell.value;
      } catch {
        return null;
      }
    }

    function isJsonDropdownCell(cell) {
      const obj = parseJsonValue(cell);
      return !!(obj && typeof obj === 'object' && String(obj.type || '').toLowerCase() === 'dropdown' && Array.isArray(obj.options));
    }

    function getJsonDropdownSelected(cell) {
      const obj = parseJsonValue(cell);
      if (!obj || typeof obj !== 'object') return '';
      if (obj.selected !== undefined && obj.selected !== null) return String(obj.selected);
      if (obj.selectd !== undefined && obj.selectd !== null) return String(obj.selectd);
      return '';
    }

    function getJsonDropdownOptions(cell) {
      const obj = parseJsonValue(cell);
      if (!obj || !Array.isArray(obj.options)) return [''];
      return obj.options.map(v => String(v));
    }

    function isCellEditable(cell = null, rowDef = {}, colDef = {}) {
      const resolvedUserSelect = withDefault(
        cell?.user_select,
        withDefault(
          rowDef?.user_select,
          withDefault(colDef?.user_select, DEFAULTS.CELL.user_select)
        )
      );
      return !isExplicitFalse(resolvedUserSelect);
    }

    function cellDisplayValue(cell) {
      if (!cell) return '';
      const type = String(cell.value_type || 'TEXT').toUpperCase();
      const raw = cell.value ?? '';

      if (type === 'JSON' && isJsonDropdownCell(cell)) {
        return getJsonDropdownSelected(cell);
      }

      switch (type) {
        case 'INTEGER':
          return raw === null || raw === '' ? '' : String(parseInt(raw, 10));
        case 'REAL':
          return raw === null || raw === '' ? '' : String(raw);
        case 'BOOLEAN':
          return isBooleanTrue(raw);
        case 'BLOB':
          return raw == null || raw === '' ? '' : '[BLOB]';
        case 'NULL':
          return '';
        case 'JSON':
          return raw ?? '';
        case 'TEXT':
        default:
          return raw ?? '';
      }
    }

    function normalizeNoticeValue(value) {
      if (value === null || value === undefined) return '';
      const text = String(value).trim();
      if (!text) return '';
      if (text.toUpperCase() === 'NULL') return '';
      return text;
    }


    function getSheetSortState(sheetName) {
      return sheetSortState.get(sheetName) || { col: null, direction: null };
    }

    function setSheetSortState(sheetName, col, direction) {
      if (!sheetName) return;
      if (!col || !direction) {
        sheetSortState.delete(sheetName);
        return;
      }
      sheetSortState.set(sheetName, { col, direction });
    }

    function getSortIndicator(direction) {
      if (direction === 'asc') return '▲';
      if (direction === 'desc') return '▼';
      return '';
    }

    function getNextSortDirection(sheetName, col) {
      const current = getSheetSortState(sheetName);
      if (current.col !== col) return 'asc';
      if (current.direction === 'asc') return 'desc';
      if (current.direction === 'desc') return null;
      return 'asc';
    }

    function getCellSortMeta(cell) {
      if (!cell) return { type: 'empty', value: '' };

      const valueType = String(cell.value_type || 'TEXT').toUpperCase();
      const displayValue = cellDisplayValue(cell);

      if (valueType === 'BOOLEAN') {
        return { type: 'number', value: displayValue === true ? 1 : 0 };
      }

      if (valueType === 'INTEGER' || valueType === 'REAL') {
        const num = Number(displayValue);
        if (!Number.isNaN(num)) return { type: 'number', value: num };
      }

      return { type: 'text', value: String(displayValue ?? '').trim().toLocaleLowerCase('de-DE') };
    }

    function compareCellValues(aCell, bCell) {
      const a = getCellSortMeta(aCell);
      const b = getCellSortMeta(bCell);

      const aEmpty = a.type === 'empty' || a.value === '';
      const bEmpty = b.type === 'empty' || b.value === '';

      if (aEmpty && bEmpty) return 0;
      if (aEmpty) return 1;
      if (bEmpty) return -1;

      if (a.type === 'number' && b.type === 'number') {
        return a.value - b.value;
      }

      return String(a.value).localeCompare(String(b.value), 'de-DE', {
        numeric: true,
        sensitivity: 'base'
      });
    }

    function getSortedRowNumbers(sheet, sheetName) {
      const baseRowNums = [...sheet.rows].sort((a, b) => a - b);
      const sortState = getSheetSortState(sheetName);

      if (!sortState.col || !sortState.direction) {
        return baseRowNums;
      }

      const factor = sortState.direction === 'desc' ? -1 : 1;

      return [...baseRowNums].sort((a, b) => {
        const aCell = sheet.cells.get(`${sortState.col}|${a}`) || null;
        const bCell = sheet.cells.get(`${sortState.col}|${b}`) || null;
        const result = compareCellValues(aCell, bCell);
        if (result !== 0) return result * factor;
        return a - b;
      });
    }

    function buildStyleString(styleMap) {
      return Object.entries(styleMap)
        .filter(([, value]) => value !== null && value !== undefined && value !== '')
        .map(([key, value]) => `${key.replace(/[A-Z]/g, m => '-' + m.toLowerCase())}:${String(value)}`)
        .join(';');
    }

    function buildTabStyle(tabDef = {}) {
      return buildStyleString({
        visibility: styleValue(withDefault(tabDef.visibility, DEFAULTS.TAB.visibility)),
        userSelect: styleValue(cssUserSelect(withDefault(tabDef.user_select, DEFAULTS.TAB.user_select)))
      });
    }

    function buildCellStyle(cell = null, rowDef = {}, colDef = {}) {
      const fixedWidth = withDefault(colDef?.width, DEFAULTS.COLUMN.width);
      const fixedHeight = withDefault(rowDef?.height, DEFAULTS.ROW.height);

      const resolvedUserSelect = withDefault(
        cell?.user_select,
        withDefault(
          rowDef?.user_select,
          withDefault(colDef?.user_select, DEFAULTS.CELL.user_select)
        )
      );

      return buildStyleString({
        width: styleValue(fixedWidth),
        minWidth: styleValue(fixedWidth),
        maxWidth: styleValue(fixedWidth),

        height: styleValue(fixedHeight),
        minHeight: styleValue(fixedHeight),
        maxHeight: styleValue(fixedHeight),

        padding: styleValue(withDefault(cell?.padding, DEFAULTS.CELL.padding)),

        border: styleValue(withDefault(cell?.border, DEFAULTS.CELL.border)),
        borderTop: styleValue(withDefault(cell?.border_top, DEFAULTS.CELL.border_top)),
        borderRight: styleValue(withDefault(cell?.border_right, DEFAULTS.CELL.border_right)),
        borderBottom: styleValue(withDefault(cell?.border_bottom, DEFAULTS.CELL.border_bottom)),
        borderLeft: styleValue(withDefault(cell?.border_left, DEFAULTS.CELL.border_left)),

        backgroundColor: styleValue(
          withDefault(
            cell?.background_color,
            withDefault(
              rowDef?.background_color,
              withDefault(colDef?.background_color, DEFAULTS.CELL.background_color)
            )
          )
        ),

        boxShadow: styleValue(withDefault(cell?.box_shadow, DEFAULTS.CELL.box_shadow)),
        textAlign: styleValue(withDefault(cell?.text_align, DEFAULTS.CELL.text_align)),
        verticalAlign: styleValue(withDefault(cell?.vertical_align, DEFAULTS.CELL.vertical_align)),
        font: styleValue(withDefault(cell?.font, DEFAULTS.CELL.font)),
        fontWeight: styleValue(withDefault(cell?.font_weight, DEFAULTS.CELL.font_weight)),
        color: styleValue(withDefault(cell?.color, DEFAULTS.CELL.color)),
        whiteSpace: styleValue(withDefault(cell?.white_space, DEFAULTS.CELL.white_space)),
        overflow: styleValue(withDefault(cell?.overflow, DEFAULTS.CELL.overflow)),
        textOverflow: styleValue(withDefault(cell?.text_overflow, DEFAULTS.CELL.text_overflow)),
        display: styleValue(withDefault(cell?.display, DEFAULTS.CELL.display)),
        visibility: styleValue(
          withDefault(
            cell?.visibility,
            withDefault(
              rowDef?.visibility,
              withDefault(colDef?.visibility, DEFAULTS.CELL.visibility)
            )
          )
        ),
        opacity: styleValue(withDefault(cell?.opacity, DEFAULTS.CELL.opacity)),
        cursor: styleValue(withDefault(cell?.cursor, DEFAULTS.CELL.cursor)),
        userSelect: styleValue(cssUserSelect(resolvedUserSelect))
      });
    }

    function hasTable(database, tableName) {
      const sql = `SELECT name FROM sqlite_master WHERE type='table' AND name=${JSON.stringify(tableName)}`;
      return database.exec(sql).length > 0;
    }

    function requireSchema(database) {
      const required = ['cells', 'tabs', 'lines', 'parts'];
      const missing = required.filter(name => !hasTable(database, name));
      if (missing.length) {
        throw new Error(`Die SQLite-Datei enthält nicht alle benötigten Tabellen: ${missing.join(', ')}`);
      }
    }

    function queryTable(database, sql) {
      const result = database.exec(sql);
      if (!result.length) return [];
      const columns = result[0].columns;
      return result[0].values.map(row => Object.fromEntries(row.map((value, i) => [columns[i], value])));
    }

    function queryWorkbook(database) {
      return {
        tabs: queryTable(database, `
          SELECT
            name AS z, sort_order, visibility, user_select
          FROM tabs
          ORDER BY sort_order, name
        `),
        rows: queryTable(database, `
          SELECT
            line AS y, tab AS z, height, background_color, visibility, user_select
          FROM lines
          ORDER BY tab, line
        `),
        columns: queryTable(database, `
          SELECT
            part AS x, tab AS z, width, background_color, visibility, user_select
          FROM parts
          ORDER BY tab, part
        `),
        cells: queryTable(database, `
          SELECT
            part AS x, line AS y, tab AS z,
            value_type, value,
            padding, border, border_top, border_right, border_bottom, border_left,
            background_color, box_shadow, text_align, vertical_align,
            font, font_weight, color, white_space, overflow, text_overflow,
            display, visibility, opacity, cursor, user_select, notice
          FROM cells
          ORDER BY tab, line, part
        `)
      };
    }

    function ensureSheet(book, name) {
      if (!book.has(name)) {
        book.set(name, {
          tabDef: {},
          rowDefs: new Map(),
          colDefs: new Map(),
          cells: new Map(),
          rows: new Set(),
          cols: new Set()
        });
      }
      return book.get(name);
    }

    function buildWorkbook(data) {
      const book = new Map();

      for (const tab of data.tabs) {
        const sheetName = tab.z || 'Tabelle';
        const sheet = ensureSheet(book, sheetName);
        sheet.tabDef = tab;
      }

      for (const row of data.rows) {
        const sheetName = row.z || 'Tabelle';
        const rowNum = Number(row.y);
        if (!Number.isFinite(rowNum)) continue;
        const sheet = ensureSheet(book, sheetName);
        sheet.rowDefs.set(rowNum, row);
        sheet.rows.add(rowNum);
      }

      for (const col of data.columns) {
        const sheetName = col.z || 'Tabelle';
        const colName = normalizeColName(col.x);
        if (!colName) continue;
        const sheet = ensureSheet(book, sheetName);
        sheet.colDefs.set(colName, { ...col, x: colName });
        sheet.cols.add(colName);
      }

      for (const cell of data.cells) {
        const sheetName = cell.z || 'Tabelle';
        const colName = normalizeColName(cell.x);
        const rowNum = Number(cell.y);
        if (!colName || !Number.isFinite(rowNum)) continue;

        const sheet = ensureSheet(book, sheetName);
        sheet.cells.set(`${colName}|${rowNum}`, { ...cell, x: colName, y: rowNum });
        sheet.cols.add(colName);
        sheet.rows.add(rowNum);
      }

      return book;
    }

    function getCellRecord(sheetName, cellRef) {
      const match = /^([A-Z]+)(\d+)$/.exec(String(cellRef || ''));
      if (!match) return null;

      const col = match[1];
      const rowNum = Number(match[2]);
      const sheet = workbook.get(sheetName);
      if (!sheet) return null;

      return {
        sheet,
        col,
        rowNum,
        key: `${col}|${rowNum}`,
        cell: sheet.cells.get(`${col}|${rowNum}`) || null,
        rowDef: sheet.rowDefs.get(rowNum) || {},
        colDef: sheet.colDefs.get(col) || {}
      };
    }

    function getSelectedCellMeta() {
      if (!currentSheet || !currentSelectedCellRef) return null;
      return getCellRecord(currentSheet, currentSelectedCellRef);
    }

    function setCellValueInDb(sheetName, col, rowNum, rawValue) {
      if (!db) throw new Error('Es ist keine Datenbank geladen.');

      const cellKey = `${col}|${rowNum}`;
      const sheet = workbook.get(sheetName);
      const currentCell = sheet?.cells.get(cellKey) || null;

      if (!currentCell) throw new Error('Zelle nicht gefunden.');

      const valueType = String(currentCell.value_type || 'TEXT').toUpperCase();

      if (valueType === 'BLOB') {
        throw new Error('BLOB-Zellen werden noch nicht unterstützt.');
      }

      if (valueType === 'JSON' && isJsonDropdownCell(currentCell)) {
        const obj = parseJsonValue(currentCell) || {};
        const options = Array.isArray(obj.options) ? obj.options.map(v => String(v)) : [''];
        const selectedValue = String(rawValue ?? '');

        if (!options.includes(selectedValue)) {
          throw new Error('Wert ist nicht in den Dropdown-Optionen enthalten.');
        }

        const newObj = {
          ...obj,
          type: 'dropdown',
          selected: selectedValue,
          selectd: selectedValue,
          options
        };

        db.run(
          `UPDATE cells
           SET value = ?
           WHERE tab = ? AND part = ? AND line = ?`,
          [JSON.stringify(newObj), sheetName, col, rowNum]
        );
        return;
      }

      if (valueType === 'BOOLEAN') {
        const boolValue = rawValue === true || rawValue === 1 ? '1' : '0';
        db.run(
          `UPDATE cells
           SET value = ?
           WHERE tab = ? AND part = ? AND line = ?`,
          [boolValue, sheetName, col, rowNum]
        );
        return;
      }

      if (valueType === 'INTEGER') {
        if (rawValue === '') {
          db.run(
            `UPDATE cells
             SET value = ''
             WHERE tab = ? AND part = ? AND line = ?`,
            [sheetName, col, rowNum]
          );
        } else {
          const parsed = Number(rawValue);
          if (!Number.isInteger(parsed)) {
            throw new Error('Bitte eine gültige Ganzzahl eingeben.');
          }
          db.run(
            `UPDATE cells
             SET value = ?
             WHERE tab = ? AND part = ? AND line = ?`,
            [String(parsed), sheetName, col, rowNum]
          );
        }
        return;
      }

      if (valueType === 'REAL') {
        if (rawValue === '') {
          db.run(
            `UPDATE cells
             SET value = ''
             WHERE tab = ? AND part = ? AND line = ?`,
            [sheetName, col, rowNum]
          );
        } else {
          const parsed = Number(String(rawValue).replace(',', '.'));
          if (Number.isNaN(parsed)) {
            throw new Error('Bitte eine gültige Zahl eingeben.');
          }
          db.run(
            `UPDATE cells
             SET value = ?
             WHERE tab = ? AND part = ? AND line = ?`,
            [String(parsed), sheetName, col, rowNum]
          );
        }
        return;
      }

      db.run(
        `UPDATE cells
         SET value = ?
         WHERE tab = ? AND part = ? AND line = ?`,
        [String(rawValue ?? ''), sheetName, col, rowNum]
      );
    }

    function setColumnWidthInDb(sheetName, col, widthPx) {
      if (!db) throw new Error('Es ist keine Datenbank geladen.');
      const safeWidth = Math.max(30, Math.round(widthPx)) + 'px';

      db.run(
        `UPDATE parts
         SET width = ?
         WHERE tab = ? AND UPPER(part) = ?`,
        [safeWidth, sheetName, col]
      );

      return safeWidth;
    }

    function setRowHeightInDb(sheetName, rowNum, heightPx) {
      if (!db) throw new Error('Es ist keine Datenbank geladen.');
      const safeHeight = Math.max(20, Math.round(heightPx)) + 'px';

      db.run(
        `UPDATE lines
         SET height = ?
         WHERE tab = ? AND line = ?`,
        [safeHeight, sheetName, rowNum]
      );

      return safeHeight;
    }

    async function reloadWorkbookFromDb(statusMessage = null) {
      if (!db) return;

      const data = queryWorkbook(db);
      workbook = buildWorkbook(data);

      if (!currentSheet || !workbook.has(currentSheet)) {
        currentSheet = [...workbook.keys()][0] || null;
      }

      renderTabs();

      if (currentSheet) {
        renderSheet(currentSheet);
      } else if (sheetWrapEl) {
        sheetWrapEl.innerHTML = '<div class="empty">Die Datenbank enthält keine darstellbaren Blätter.</div>';
      }

      if (statusMessage) {
        setStatus(statusMessage);
      }
    }

    function clearSelectedCell() {
      for (const td of sheetWrapEl.querySelectorAll('td.cell-selected')) {
        td.classList.remove('cell-selected');
      }
    }

    function selectCell(td) {
      clearSelectedCell();
      td.classList.add('cell-selected');

      currentSelectedCellRef = td.dataset.cell || null;

      if (nameBox) nameBox.textContent = td.dataset.cell || '-';
      if (formulaBox) {
        formulaBox.value = td.dataset.value || '';
        formulaBox.disabled = td.dataset.editable !== 'true';
      }
    }

    async function toggleBooleanCell(td) {
      if (!td || td.dataset.editable !== 'true') return;

      const cellRef = td.dataset.cell || '';
      const meta = getCellRecord(currentSheet, cellRef);
      if (!meta || !meta.cell) return;

      const valueType = String(meta.cell.value_type || 'TEXT').toUpperCase();
      if (valueType !== 'BOOLEAN') return;

      try {
        const oldValue = isBooleanTrue(meta.cell.value);
        setCellValueInDb(currentSheet, meta.col, meta.rowNum, !oldValue);
        await reloadWorkbookFromDb(`${currentDbName} geändert`);
        const updatedTd = sheetWrapEl.querySelector(`td[data-cell="${cellRef}"]`);
        if (updatedTd) selectCell(updatedTd);
      } catch (error) {
        console.error(error);
        setStatus(error.message || String(error), true);
        await reloadWorkbookFromDb();
      }
    }

    async function updateJsonDropdownCell(td, selectedValue) {
      if (!td || td.dataset.editable !== 'true') return;

      const cellRef = td.dataset.cell || '';
      const meta = getCellRecord(currentSheet, cellRef);
      if (!meta || !meta.cell) return;

      try {
        setCellValueInDb(currentSheet, meta.col, meta.rowNum, selectedValue);
        await reloadWorkbookFromDb(`${currentDbName} geändert`);
        const updatedTd = sheetWrapEl.querySelector(`td[data-cell="${cellRef}"]`);
        if (updatedTd) selectCell(updatedTd);
      } catch (error) {
        console.error(error);
        setStatus(error.message || String(error), true);
        await reloadWorkbookFromDb();
      }
    }

    function activateCellEditor(td) {
      if (!td || td.dataset.editable !== 'true') return;
      if (td.dataset.editing === 'true') return;

      const cellRef = td.dataset.cell || '';
      const meta = getCellRecord(currentSheet, cellRef);
      if (!meta || !meta.cell) return;

      const valueType = String(meta.cell.value_type || 'TEXT').toUpperCase();

      if (valueType === 'BOOLEAN') {
        toggleBooleanCell(td);
        return;
      }

      if (valueType === 'JSON' && isJsonDropdownCell(meta.cell)) {
        const select = td.querySelector('select.cell-dropdown');
        if (select && !select.disabled) select.focus();
        return;
      }

      if (valueType === 'BLOB') return;

      td.dataset.editing = 'true';
      td.classList.add('cell-editing');

      const oldValue = td.dataset.value || '';
      td.innerHTML = '';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'cell-editor';
      input.value = oldValue;

      let finished = false;

      const finish = async (save) => {
        if (finished) return;
        finished = true;

        const newValue = input.value;
        td.dataset.editing = 'false';
        td.classList.remove('cell-editing');

        if (!save || newValue === oldValue) {
          await reloadWorkbookFromDb();
          const updatedTd = sheetWrapEl.querySelector(`td[data-cell="${cellRef}"]`);
          if (updatedTd) selectCell(updatedTd);
          return;
        }

        try {
          setCellValueInDb(currentSheet, meta.col, meta.rowNum, newValue);
          await reloadWorkbookFromDb(`${currentDbName} geändert`);
          const updatedTd = sheetWrapEl.querySelector(`td[data-cell="${cellRef}"]`);
          if (updatedTd) selectCell(updatedTd);
        } catch (error) {
          console.error(error);
          setStatus(error.message || String(error), true);
          await reloadWorkbookFromDb();
        }
      };

      input.addEventListener('keydown', async (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          await finish(true);
        } else if (event.key === 'Escape') {
          event.preventDefault();
          await finish(false);
        }
      });

      input.addEventListener('blur', async () => {
        await finish(true);
      });

      td.appendChild(input);
      input.focus();
      input.select();
    }

    async function saveFormulaBoxToSelectedCell() {
      const meta = getSelectedCellMeta();
      if (!meta || !meta.cell || !formulaBox) return;

      if (!isCellEditable(meta.cell, meta.rowDef, meta.colDef)) {
        setStatus('Diese Zelle ist nicht editierbar.', true);
        formulaBox.disabled = true;
        return;
      }

      const valueType = String(meta.cell.value_type || 'TEXT').toUpperCase();

      try {
        if (valueType === 'BOOLEAN') {
          const raw = String(formulaBox.value || '').trim().toLowerCase();
          const boolValue =
            raw === 'true' || raw === '1' || raw === 'ja' || raw === 'yes' || raw === 'on';
          setCellValueInDb(currentSheet, meta.col, meta.rowNum, boolValue);
        } else {
          setCellValueInDb(currentSheet, meta.col, meta.rowNum, formulaBox.value);
        }

        await reloadWorkbookFromDb(`${currentDbName} geändert`);
        const updatedTd = sheetWrapEl.querySelector(`td[data-cell="${currentSelectedCellRef}"]`);
        if (updatedTd) selectCell(updatedTd);
      } catch (error) {
        console.error(error);
        setStatus(error.message || String(error), true);
        await reloadWorkbookFromDb();
      }
    }

    function startColumnResize(event, col, th) {
      event.preventDefault();
      event.stopPropagation();

      if (!currentSheet) return;

      const startX = event.clientX;
      const startWidth = th.getBoundingClientRect().width;
      document.body.classList.add('col-resizing');

      function onMouseMove(moveEvent) {
        const delta = moveEvent.clientX - startX;
        const newWidth = Math.max(30, startWidth + delta);
        const widthStr = `${Math.round(newWidth)}px`;

        th.style.width = widthStr;
        th.style.minWidth = widthStr;
        th.style.maxWidth = widthStr;

        const colIndex = [...th.parentElement.children].indexOf(th);
        if (colIndex > 0) {
          const table = th.closest('table');
          const colElements = table.querySelectorAll('colgroup col');
          const colEl = colElements[colIndex];
          if (colEl) {
            colEl.style.width = widthStr;
            colEl.style.minWidth = widthStr;
            colEl.style.maxWidth = widthStr;
          }
        }
      }

      async function onMouseUp(upEvent) {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        document.body.classList.remove('col-resizing');

        const delta = upEvent.clientX - startX;
        const newWidth = Math.max(30, startWidth + delta);

        try {
          setColumnWidthInDb(currentSheet, col, newWidth);
          await reloadWorkbookFromDb(`${currentDbName} geändert`);
        } catch (error) {
          console.error(error);
          setStatus(error.message || String(error), true);
          await reloadWorkbookFromDb();
        }
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }

    function startRowResize(event, rowNum, rowHeader) {
      event.preventDefault();
      event.stopPropagation();

      if (!currentSheet) return;

      const startY = event.clientY;
      const tr = rowHeader.closest('tr');
      const startHeight = tr.getBoundingClientRect().height;
      document.body.classList.add('row-resizing');

      function onMouseMove(moveEvent) {
        const delta = moveEvent.clientY - startY;
        const newHeight = Math.max(20, startHeight + delta);
        const heightStr = `${Math.round(newHeight)}px`;

        tr.style.height = heightStr;
        tr.style.minHeight = heightStr;
        tr.style.maxHeight = heightStr;

        const cells = tr.querySelectorAll('th,td');
        for (const cell of cells) {
          cell.style.height = heightStr;
          cell.style.minHeight = heightStr;
          cell.style.maxHeight = heightStr;
        }
      }

      async function onMouseUp(upEvent) {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        document.body.classList.remove('row-resizing');

        const delta = upEvent.clientY - startY;
        const newHeight = Math.max(20, startHeight + delta);

        try {
          setRowHeightInDb(currentSheet, rowNum, newHeight);
          await reloadWorkbookFromDb(`${currentDbName} geändert`);
        } catch (error) {
          console.error(error);
          setStatus(error.message || String(error), true);
          await reloadWorkbookFromDb();
        }
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }

    function showCustomTooltip(text, mouseEvent) {
      if (!customTooltip) return;

      const content = normalizeNoticeValue(text);
      if (!content) {
        hideCustomTooltip();
        return;
      }

      customTooltip.textContent = content;
      customTooltip.style.display = 'block';
      positionCustomTooltip(mouseEvent);
    }

    function positionCustomTooltip(mouseEvent) {
      if (!customTooltip || customTooltip.style.display === 'none') return;

      const offset = 14;
      const rect = customTooltip.getBoundingClientRect();
      let left = mouseEvent.clientX + offset;
      let top = mouseEvent.clientY + offset;

      if (left + rect.width > window.innerWidth - 8) {
        left = window.innerWidth - rect.width - 8;
      }
      if (top + rect.height > window.innerHeight - 8) {
        top = mouseEvent.clientY - rect.height - offset;
      }
      if (left < 8) left = 8;
      if (top < 8) top = 8;

      customTooltip.style.left = `${left}px`;
      customTooltip.style.top = `${top}px`;
    }

    function hideCustomTooltip() {
      if (!customTooltip) return;
      customTooltip.style.display = 'none';
      customTooltip.textContent = '';
    }

    function renderTabs() {
      if (!tabsEl) return;

      tabsEl.innerHTML = '';
      const names = [...workbook.keys()];

      if (!names.length) {
        const msg = document.createElement('div');
        msg.className = 'muted';
        msg.textContent = 'Keine Blätter gefunden';
        tabsEl.appendChild(msg);
        return;
      }

      for (const name of names) {
        const sheet = workbook.get(name);
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'tab' + (name === currentSheet ? ' active' : '');
        tab.textContent = name;

        const style = buildTabStyle(sheet?.tabDef || {});
        if (style) tab.setAttribute('style', style);

        tab.addEventListener('click', () => {
          currentSheet = name;
          renderTabs();
          renderSheet(name);
        });

        tabsEl.appendChild(tab);
      }
    }

    function renderSheet(sheetName) {
      if (!sheetWrapEl) return;

      const sheet = workbook.get(sheetName);
      if (!sheet) {
        sheetWrapEl.innerHTML = '<div class="empty">Blatt nicht gefunden</div>';
        return;
      }

      const cols = sortColumns(sheet.cols);
      const sortState = getSheetSortState(sheetName);
      const rowNums = getSortedRowNumbers(sheet, sheetName);

      if (!cols.length || !rowNums.length) {
        sheetWrapEl.innerHTML = '<div class="empty">Dieses Blatt enthält keine darstellbaren Zeilen oder Spalten.</div>';
        return;
      }

      const colgroup = cols.map(col => {
        const colDef = sheet.colDefs.get(col) || {};
        const width = withDefault(colDef.width, DEFAULTS.COLUMN.width);
        return `<col style="width:${escapeHtml(width)};min-width:${escapeHtml(width)};max-width:${escapeHtml(width)};">`;
      }).join('');

      let html = `<table class="sheet"><colgroup><col style="width:48px;min-width:48px;max-width:48px;">${colgroup}</colgroup><thead><tr><th class="corner-cell"></th>`;

      for (const col of cols) {
        const colDef = sheet.colDefs.get(col) || {};
        const colHeaderStyle = buildStyleString({
          width: styleValue(withDefault(colDef.width, DEFAULTS.COLUMN.width)),
          minWidth: styleValue(withDefault(colDef.width, DEFAULTS.COLUMN.width)),
          maxWidth: styleValue(withDefault(colDef.width, DEFAULTS.COLUMN.width)),
          backgroundColor: styleValue(withDefault(colDef.background_color, DEFAULTS.COLUMN.background_color)),
          visibility: styleValue(withDefault(colDef.visibility, DEFAULTS.COLUMN.visibility)),
          userSelect: styleValue(cssUserSelect(withDefault(colDef.user_select, DEFAULTS.COLUMN.user_select)))
        });

        const isSortedCol = sortState.col === col && !!sortState.direction;
        const sortIndicator = getSortIndicator(isSortedCol ? sortState.direction : null);

        html += `<th class="col-header sortable${isSortedCol ? ' sorted' : ''}" data-col="${escapeHtml(col)}"${colHeaderStyle ? ` style="${escapeHtml(colHeaderStyle)}"` : ''}>
          <div class="col-header-inner">
            <span class="col-header-label">${escapeHtml(col)}</span>
            <span class="sort-indicator">${escapeHtml(sortIndicator)}</span>
            <div class="col-resizer" data-resize-col="${escapeHtml(col)}"></div>
          </div>
        </th>`;
      }

      html += '</tr></thead><tbody>';

      for (const rowNum of rowNums) {
        const rowDef = sheet.rowDefs.get(rowNum) || {};
        const rowHeaderStyle = buildStyleString({
          height: styleValue(withDefault(rowDef.height, DEFAULTS.ROW.height)),
          minHeight: styleValue(withDefault(rowDef.height, DEFAULTS.ROW.height)),
          maxHeight: styleValue(withDefault(rowDef.height, DEFAULTS.ROW.height)),
          backgroundColor: styleValue(withDefault(rowDef.background_color, DEFAULTS.ROW.background_color)),
          visibility: styleValue(withDefault(rowDef.visibility, DEFAULTS.ROW.visibility)),
          userSelect: styleValue(cssUserSelect(withDefault(rowDef.user_select, DEFAULTS.ROW.user_select)))
        });

        html += `<tr data-row="${rowNum}"><th class="row-header" data-row-header="${rowNum}"${rowHeaderStyle ? ` style="${escapeHtml(rowHeaderStyle)}"` : ''}>
          <div class="row-header-inner">
            <span>${escapeHtml(rowNum)}</span>
            <div class="row-resizer" data-resize-row="${rowNum}"></div>
          </div>
        </th>`;

        for (const col of cols) {
          const cell = sheet.cells.get(`${col}|${rowNum}`) || null;
          const colDef = sheet.colDefs.get(col) || {};
          const value = cellDisplayValue(cell);
          const titleValue = normalizeNoticeValue(withDefault(cell?.notice, DEFAULTS.CELL.notice));
          const noticeAttr = titleValue ? ` data-notice="${escapeHtml(titleValue)}"` : '';
          const style = buildCellStyle(cell, rowDef, colDef);
          const cellRef = `${col}${rowNum}`;
          const editable = isCellEditable(cell, rowDef, colDef);

          const isBooleanCell = cell && String(cell.value_type || '').toUpperCase() === 'BOOLEAN';
          const isDropdownCell = cell && String(cell.value_type || '').toUpperCase() === 'JSON' && isJsonDropdownCell(cell);

          let tdClass = '';
          let renderedValue = escapeHtml(value);

          if (isBooleanCell) {
            tdClass = 'bool-cell';
            renderedValue = `<span class="bool-checkbox${value === true ? ' checked' : ''}"></span>`;
          } else if (isDropdownCell) {
            tdClass = 'json-dropdown-cell dropdown-cell';
            const options = getJsonDropdownOptions(cell);
            const selected = getJsonDropdownSelected(cell);

            renderedValue = `<select class="cell-dropdown" data-dropdown-cell="${escapeHtml(cellRef)}" ${editable ? '' : 'disabled'}>` +
              options.map(option => {
                const sel = option === selected ? ' selected' : '';
                return `<option value="${escapeHtml(option)}"${sel}>${escapeHtml(option)}</option>`;
              }).join('') +
              `</select>`;
          }

          const classAttr = tdClass ? ` class="${tdClass}"` : '';

          html += `<td${classAttr} data-cell="${escapeHtml(cellRef)}" data-value="${escapeHtml(String(value))}" data-editable="${editable ? 'true' : 'false'}"${noticeAttr}${style ? ` style="${escapeHtml(style)}"` : ''}>${renderedValue}</td>`;
        }

        html += '</tr>';
      }

      html += '</tbody></table>';
      sheetWrapEl.innerHTML = html;

      for (const td of sheetWrapEl.querySelectorAll('td[data-cell]')) {
        td.addEventListener('click', () => selectCell(td));
        td.addEventListener('dblclick', () => activateCellEditor(td));
        td.addEventListener('mouseenter', (event) => {
          const notice = td.dataset.notice || '';
          if (notice) showCustomTooltip(notice, event);
        });
        td.addEventListener('mousemove', (event) => {
          const notice = td.dataset.notice || '';
          if (notice) positionCustomTooltip(event);
        });
        td.addEventListener('mouseleave', () => hideCustomTooltip());
      }

      for (const select of sheetWrapEl.querySelectorAll('select.cell-dropdown[data-dropdown-cell]')) {
        select.addEventListener('click', (event) => {
          event.stopPropagation();
          const td = select.closest('td[data-cell]');
          if (td) selectCell(td);
        });

        select.addEventListener('change', async () => {
          const td = select.closest('td[data-cell]');
          if (!td) return;
          await updateJsonDropdownCell(td, select.value);
        });
      }

      for (const header of sheetWrapEl.querySelectorAll('th.col-header.sortable[data-col]')) {
        header.addEventListener('click', (event) => {
          if (event.target.closest('.col-resizer')) return;
          const col = header.dataset.col;
          if (!col) return;
          const nextDirection = getNextSortDirection(sheetName, col);
          setSheetSortState(sheetName, col, nextDirection);
          renderSheet(sheetName);
        });
      }

      for (const resizer of sheetWrapEl.querySelectorAll('.col-resizer[data-resize-col]')) {
        resizer.addEventListener('mousedown', (event) => {
          const col = resizer.dataset.resizeCol;
          const th = resizer.closest('th[data-col]');
          if (!col || !th) return;
          startColumnResize(event, col, th);
        });
      }

      for (const resizer of sheetWrapEl.querySelectorAll('.row-resizer[data-resize-row]')) {
        resizer.addEventListener('mousedown', (event) => {
          const rowNum = Number(resizer.dataset.resizeRow);
          const rowHeader = resizer.closest('th[data-row-header]');
          if (!rowNum || !rowHeader) return;
          startRowResize(event, rowNum, rowHeader);
        });
      }
    }

    document.addEventListener('scroll', () => hideCustomTooltip(), true);
    document.addEventListener('mousedown', () => hideCustomTooltip());

    async function ensureSqlJs() {
      if (!SQL) {
        SQL = await initSqlJs({
          locateFile: file => `${file}`
        });
      }
    }

    async function loadDatabaseFromArrayBuffer(buffer, label, options = {}) {
      try {
        await ensureSqlJs();
        db = new SQL.Database(new Uint8Array(buffer));

        requireSchema(db);

        const data = queryWorkbook(db);
        workbook = buildWorkbook(data);
        currentSheet = [...workbook.keys()][0] || null;

        currentDbPath = options.path || null;
        currentDbName = options.name || label || 'database.sqlite';
        currentSelectedCellRef = null;

        renderTabs();

        if (currentSheet) {
          renderSheet(currentSheet);
        } else if (sheetWrapEl) {
          sheetWrapEl.innerHTML = '<div class="empty">Die Datenbank enthält keine darstellbaren Blätter.</div>';
        }

        if (nameBox) nameBox.textContent = '-';
        if (formulaBox) {
          formulaBox.value = '-';
          formulaBox.disabled = true;
        }

        setStatus(`${label} geladen · ${data.cells.length} Zellen · ${workbook.size} Blatt/Blätter`);
      } catch (error) {
        console.error(error);
        workbook = new Map();
        currentSheet = null;
        currentDbPath = null;
        currentSelectedCellRef = null;
        renderTabs();
        if (sheetWrapEl) {
          sheetWrapEl.innerHTML = `<div class="empty">Fehler beim Laden: ${escapeHtml(error.message || String(error))}</div>`;
        }
        if (formulaBox) {
          formulaBox.value = '-';
          formulaBox.disabled = true;
        }
        setStatus(error.message || String(error), true);
      }
    }

    async function saveDatabaseToFile() {
      try {
        if (!db) throw new Error('Es ist keine Datenbank geladen.');

        const bytes = Array.from(db.export());

        if (isElectron()) {
          const result = await window.sqlspreadFS.saveDatabase({
            path: currentDbPath,
            filename: currentDbName || 'database.sqlite',
            data: bytes
          });

          if (!result || result.canceled) {
            setStatus('Speichern abgebrochen');
            return;
          }

          currentDbPath = result.path || currentDbPath;
          currentDbName = result.name || currentDbName;
          setStatus(`${currentDbName} gespeichert`);
          return;
        }

        const blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = currentDbName || 'database.sqlite';
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus(`${currentDbName || 'database.sqlite'} gespeichert`);
      } catch (error) {
        console.error(error);
        setStatus(error.message || String(error), true);
      }
    }

    if (dbFileInput) {
      dbFileInput.addEventListener('change', async event => {
        const file = event.target.files?.[0];
        if (!file) return;
        setStatus(`Lade ${file.name} ...`);
        const buffer = await file.arrayBuffer();
        await loadDatabaseFromArrayBuffer(buffer, file.name, {
          name: file.name
        });
      });
    }

    if (isElectron() && openDbLabel) {
      openDbLabel.addEventListener('click', async (event) => {
        event.preventDefault();

        try {
          const result = await window.sqlspreadFS.openDatabase();
          if (!result || result.canceled) return;

          const bytes = new Uint8Array(result.data);
          await loadDatabaseFromArrayBuffer(bytes.buffer, result.name, {
            path: result.path,
            name: result.name
          });
        } catch (error) {
          console.error(error);
          setStatus(error.message || String(error), true);
        }
      });
    }

    if (saveBtn) {
      saveBtn.addEventListener('click', async () => {
        await saveDatabaseToFile();
      });
    }

    if (formulaBox) {
      formulaBox.addEventListener('keydown', async (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          await saveFormulaBoxToSelectedCell();
        }
      });

      formulaBox.addEventListener('blur', async () => {
        if (document.activeElement !== formulaBox) {
          await saveFormulaBoxToSelectedCell();
        }
      });
    }
  </script>
</body>
</html>
